# Production Docker Compose — pulls pre-built images from GitHub Container Registry.
# Copy .env.prod.example to .env.prod, fill in secrets, then run:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - charon_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "900", "1", "--save", "300", "10", "--save", "60", "10000", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    networks:
      - charon_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  miner:
    image: ghcr.io/hakaczu/charon/charon-miner:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      REDIS_ENABLED: "1"
      REDIS_CACHE_TTL: ${REDIS_CACHE_TTL:-300}
      REDIS_PUBSUB_CHANNEL_RATES: ${REDIS_PUBSUB_CHANNEL_RATES:-rates.ingested}
      REFRESH_SECONDS: ${REFRESH_SECONDS:-3600}
      TZ: ${TZ:-Europe/Warsaw}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - charon_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  brain:
    image: ghcr.io/hakaczu/charon/charon-brain:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      REDIS_ENABLED: "1"
      REDIS_PUBSUB_CHANNEL_RATES: ${REDIS_PUBSUB_CHANNEL_RATES:-rates.ingested}
      REDIS_PUBSUB_CHANNEL_SIGNALS: ${REDIS_PUBSUB_CHANNEL_SIGNALS:-signals.updated}
      TZ: ${TZ:-Europe/Warsaw}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - charon_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    image: ghcr.io/hakaczu/charon/charon-api:latest
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      REDIS_ENABLED: "1"
      REDIS_CACHE_TTL: ${REDIS_CACHE_TTL:-300}
      TZ: ${TZ:-Europe/Warsaw}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - charon_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: ghcr.io/hakaczu/charon/charon-frontend:latest
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      # Must be the public-facing URL of the API — accessible from the user's browser.
      # Set this to your server's IP or domain, e.g. https://api.yourdomain.com
      NEXT_PUBLIC_API_URL: ${API_PUBLIC_URL:-http://localhost:8000}
      NODE_ENV: production
    depends_on:
      api:
        condition: service_started
    networks:
      - charon_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:

networks:
  charon_net:
